<style>
:root{

  --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.12);--b3:rgba(255,255,255,0.18);

}
body.light{

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;margin:0;padding:0;}
html{height:100%;height:-webkit-fill-available;}
body{width:100%;height:100%;height:-webkit-fill-available;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);transition:background .25s,color .25s;}
.disp{font-family:'Bricolage Grotesque',sans-serif;}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(68,136,255,.06) 0%,transparent 70%),
radial-gradient(ellipse 40% 30% at 80% 80%,rgba(0,194,122,.05) 0%,transparent 70%);}

.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);}

.fab{position:fixed;bottom:calc(90px + env(safe-area-inset-bottom)); right:16px; z-index:40;width:52px;height:52px;border-radius:16px;background:var(--ac);border:none;color:#fff;font-size:28px;font-weight:300;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(68,136,255,.45);cursor:pointer;transition:transform .15s,box-shadow .15s;}

.sp-body{flex:1;overflow-y:auto;padding:12px 12px;}
.sp-item{display:flex;align-items:center;gap:12px;padding:12px 12px;border-radius:var(--r);cursor:pointer;margin-bottom:2px;transition:background .13s;}
